services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: beetracker
      POSTGRES_USER: beetracker
      POSTGRES_PASSWORD: beetracker
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beetracker -d beetracker"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      beetracker:
        ipv4_address: 172.29.0.2

  redis:
    image: redis:7.4
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      beetracker:
        ipv4_address: 172.29.0.3

  tracker-gateway:
    build:
      context: .
      dockerfile: src/Services/Tracker.Gateway/Tracker.Gateway.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      BeeTracker__Postgres__ConnectionString: Host=postgres;Port=5432;Database=beetracker;Username=beetracker;Password=beetracker
      BeeTracker__Redis__Configuration: redis:6379
      BeeTracker__TrackerNode__NodeId: gateway-node-1
      BeeTracker__TrackerNode__Region: local-compose
      BeeTracker__TrustedProxy__KnownNetworks__0: 172.29.0.0/24
      BeeTracker__StartupBootstrap__MaxAttempts: 30
      BeeTracker__StartupBootstrap__RetryDelaySeconds: 2
      BeeTracker__UdpTracker__Enabled: "true"
      BeeTracker__PublicEndpoint__BaseUrl: https://${TRACKER_DOMAIN:-tracker.example.com}
      BeeTracker__PublicEndpoint__BaseDomain: ${BASE_DOMAIN:-example.com}
      BeeTracker__PublicEndpoint__AnnounceBaseUrl: https://${ANNOUNCE_DOMAIN:-${TRACKER_DOMAIN:-tracker.example.com}}
      BeeTracker__PublicEndpoint__ScrapeBaseUrl: https://${SCRAPE_DOMAIN:-${TRACKER_DOMAIN:-tracker.example.com}}
      BeeTracker__PublicEndpoint__ForceHttps: "true"
    ports:
      - "6969:6969/udp"
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      beetracker:
        ipv4_address: 172.29.0.10

  configuration-service:
    build:
      context: .
      dockerfile: src/Services/Tracker.ConfigurationService/Tracker.ConfigurationService.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      BeeTracker__Postgres__ConnectionString: Host=postgres;Port=5432;Database=beetracker;Username=beetracker;Password=beetracker
      BeeTracker__Redis__Configuration: redis:6379
      BeeTracker__TrackerNode__NodeId: configuration-node-1
      BeeTracker__TrackerNode__Region: local-compose
      BeeTracker__StartupBootstrap__MaxAttempts: 30
      BeeTracker__StartupBootstrap__RetryDelaySeconds: 2
    depends_on:
      - postgres
      - redis
    networks:
      beetracker:
        ipv4_address: 172.29.0.11

  smtp4dev:
    image: rnwood/smtp4dev:3
    ports:
      - "5000:80"
      - "2525:25"
    networks:
      beetracker:
        ipv4_address: 172.29.0.4

  admin-service:
    build:
      context: .
      dockerfile: src/Services/Tracker.AdminService/Tracker.AdminService.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      BeeTracker__Postgres__ConnectionString: Host=postgres;Port=5432;Database=beetracker;Username=beetracker;Password=beetracker
      BeeTracker__Redis__Configuration: redis:6379
      BeeTracker__TrackerNode__NodeId: admin-node-1
      BeeTracker__TrackerNode__Region: local-compose
      BeeTracker__TrustedProxy__KnownNetworks__0: 172.29.0.0/24
      BeeTracker__StartupBootstrap__MaxAttempts: 30
      BeeTracker__StartupBootstrap__RetryDelaySeconds: 2
      BeeTracker__AdminIdentity__DisableTransportSecurityRequirement: "false"
      BeeTracker__PublicEndpoint__BaseUrl: https://${ADMIN_DOMAIN:-admin.example.com}
      BeeTracker__PublicEndpoint__BaseDomain: ${BASE_DOMAIN:-example.com}
      BeeTracker__PublicEndpoint__AdminBaseUrl: https://${ADMIN_DOMAIN:-admin.example.com}
      BeeTracker__PublicEndpoint__ForceHttps: "true"
      BeeTracker__Smtp__Host: smtp4dev
      BeeTracker__Smtp__Port: "25"
      BeeTracker__Smtp__UseSsl: "false"
      BeeTracker__Smtp__UseStartTls: "false"
      BeeTracker__Smtp__RequireAuthentication: "false"
      BeeTracker__Smtp__SenderAddress: noreply@beetracker.local
      BeeTracker__Smtp__SenderDisplayName: BeeTracker
    depends_on:
      - postgres
      - redis
      - smtp4dev
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      beetracker:
        ipv4_address: 172.29.0.12

  cache-coordinator:
    build:
      context: .
      dockerfile: src/Services/Tracker.CacheCoordinator/Tracker.CacheCoordinator.Worker/Dockerfile
    environment:
      BeeTracker__Redis__Configuration: redis:6379
      BeeTracker__TrackerNode__NodeId: coordinator-node-1
      BeeTracker__TrackerNode__Region: local-compose
      BeeTracker__StartupBootstrap__MaxAttempts: 30
      BeeTracker__StartupBootstrap__RetryDelaySeconds: 2
    depends_on:
      - redis
    networks:
      beetracker:
        ipv4_address: 172.29.0.13

  telemetry-ingest:
    build:
      context: .
      dockerfile: src/Services/Tracker.TelemetryIngest/Tracker.TelemetryIngest.Worker/Dockerfile
    environment:
      BeeTracker__Postgres__ConnectionString: Host=postgres;Port=5432;Database=beetracker;Username=beetracker;Password=beetracker
      BeeTracker__TrackerNode__NodeId: telemetry-node-1
      BeeTracker__TrackerNode__Region: local-compose
      BeeTracker__StartupBootstrap__MaxAttempts: 30
      BeeTracker__StartupBootstrap__RetryDelaySeconds: 2
    depends_on:
      - postgres
    networks:
      beetracker:
        ipv4_address: 172.29.0.14

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      - tracker-gateway
      - admin-service
    environment:
      TRACKER_DOMAIN: ${TRACKER_DOMAIN:-tracker.example.com}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-admin.example.com}
      ANNOUNCE_DOMAIN: ${ANNOUNCE_DOMAIN:-${TRACKER_DOMAIN:-tracker.example.com}}
      SCRAPE_DOMAIN: ${SCRAPE_DOMAIN:-${TRACKER_DOMAIN:-tracker.example.com}}
      API_DOMAIN: ${API_DOMAIN:-${TRACKER_DOMAIN:-tracker.example.com}}
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      beetracker:
        ipv4_address: 172.29.0.20

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --quiet;
          sleep 12h & wait $${!};
        done"
    networks:
      beetracker:
        ipv4_address: 172.29.0.21

volumes:
  postgres-data:
  certbot-conf:
  certbot-www:

networks:
  beetracker:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24
