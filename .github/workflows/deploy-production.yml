name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (must have passed staging)"
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/beetracker
  ENVIRONMENT: production

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify images exist
        run: |
          services=(beetracker tracker-gateway admin-service configuration-service cache-coordinator telemetry-ingest)
          tag="${{ inputs.image_tag }}"
          for svc in "${services[@]}"; do
            image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${svc}:${tag}"
            echo "Checking ${image}..."
            docker manifest inspect "${image}" > /dev/null 2>&1 || {
              echo "::error::Image not found: ${image}"
              exit 1
            }
          done
          echo "All images verified for tag: ${tag}"

      - name: Deploy to production environment
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
        run: |
          echo "::notice::Deploying tag ${IMAGE_TAG} to production environment"
          # ──────────────────────────────────────────────────────────────────
          # DEPLOYMENT BOUNDARY
          # Replace this block with your actual deployment command.
          #
          # Available environment secrets to configure:
          #   PROD_DEPLOY_HOST  — target host for deployment
          #   PROD_DEPLOY_KEY   — SSH key or API token
          # ──────────────────────────────────────────────────────────────────
          echo "::warning::Deployment command not yet configured. Set up PROD_DEPLOY_HOST and PROD_DEPLOY_KEY secrets."
