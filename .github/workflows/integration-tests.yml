name: Integration Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_QUALITY: "preview"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ${{ env.DOTNET_QUALITY }}

      - name: Restore dependencies
        run: dotnet restore Swarmcore.slnx

      # Testcontainers require Docker — available by default on ubuntu-latest
      - name: Run integration tests
        run: >
          dotnet test Swarmcore.slnx
          --no-restore
          -c Release
          --filter "FullyQualifiedName~IntegrationTests|FullyQualifiedName~SmokeTests"
          --logger "trx;LogFileName=integration-tests.trx"
          --results-directory ./test-results
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: ./test-results/**/*.trx
          retention-days: 30

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-coverage
          path: ./test-results/**/coverage.cobertura.xml
          retention-days: 30
