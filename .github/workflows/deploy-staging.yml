name: Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: true
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/swarmcore
  ENVIRONMENT: staging

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify images exist
        run: |
          services=(swarmcore tracker-gateway admin-service configuration-service cache-coordinator telemetry-ingest)
          tag="${{ inputs.image_tag }}"
          for svc in "${services[@]}"; do
            image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${svc}:${tag}"
            echo "Checking ${image}..."
            docker manifest inspect "${image}" > /dev/null 2>&1 || {
              echo "::error::Image not found: ${image}"
              exit 1
            }
          done
          echo "All images verified for tag: ${tag}"

      - name: Deploy to staging environment
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
        run: |
          echo "::notice::Deploying tag ${IMAGE_TAG} to staging environment"
          # ──────────────────────────────────────────────────────────────────
          # DEPLOYMENT BOUNDARY
          # Replace this block with your actual deployment command.
          #
          # Available environment secrets to configure:
          #   STAGING_DEPLOY_HOST  — target host for deployment
          #   STAGING_DEPLOY_KEY   — SSH key or API token
          # ──────────────────────────────────────────────────────────────────
          echo "::warning::Deployment command not yet configured. Set up STAGING_DEPLOY_HOST and STAGING_DEPLOY_KEY secrets."
